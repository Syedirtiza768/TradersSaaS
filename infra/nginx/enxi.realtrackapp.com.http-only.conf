# Temporary HTTP-only nginx — use BEFORE Let's Encrypt certs exist.
# Install this first, run certbot, then switch to enxi.realtrackapp.com.conf
#
#   sudo cp infra/nginx/enxi.realtrackapp.com.http-only.conf \
#       /etc/nginx/sites-available/enxi.realtrackapp.com
#   sudo ln -sf /etc/nginx/sites-available/enxi.realtrackapp.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo mkdir -p /var/www/certbot
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot certonly --webroot -w /var/www/certbot \
#       -d enxi.realtrackapp.com -d www.enxi.realtrackapp.com \
#       --agree-tos -m you@example.com --non-interactive
#   sudo cp infra/nginx/enxi.realtrackapp.com.conf /etc/nginx/sites-available/enxi.realtrackapp.com
#   sudo nginx -t && sudo systemctl reload nginx

upstream traders_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name enxi.realtrackapp.com www.enxi.realtrackapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://traders_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
