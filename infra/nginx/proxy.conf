# Nginx Reverse Proxy — Main entry point
# Routes traffic between Frappe backend and Trader UI frontend
#
# Docker Compose gives each recreated container a new IP. Static `upstream`
# hostnames are resolved when nginx starts and can go stale → 502 until the
# proxy is restarted. Using the embedded DNS resolver + variables forces
# periodic re-resolution (see `valid=`).

map $host $frappe_site_name {
    default trader.localhost;
    ~^trader\.localhost$ trader.localhost;
    ~^localhost$ trader.localhost;
    # Production — same Frappe site for apex and www (site must exist under this name)
    ~^www\.enxi\.realtrackapp\.com$ enxi.realtrackapp.com;
    ~^enxi\.realtrackapp\.com$ enxi.realtrackapp.com;
}

# Preserve TLS scheme from upstream (e.g. host nginx terminates HTTPS → HTTP hop to Docker :8080).
# Overwriting X-Forwarded-Proto with `$scheme` here forces `http`, which breaks sessions / login cookies.
map $http_x_forwarded_proto $forwarded_scheme {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=30r/m;

server {
    listen 8080;
    server_name _;

    # Docker embedded DNS — re-resolve service names so upstream IPs stay current
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    client_max_body_size 50m;
    proxy_connect_timeout 10;
    proxy_send_timeout 120;
    proxy_read_timeout 120;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # --- Frappe Backend Routes ---

    # API requests → backend
    location /api {
        limit_req zone=api burst=20 nodelay;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Frappe-Site-Name $frappe_site_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # Login rate limiting
    location /api/method/login {
        limit_req zone=login burst=15 nodelay;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Frappe-Site-Name $frappe_site_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # Frontend SPA build assets — no proxy-level caching, rely on content-hash filenames
    location /assets {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
    }

    # File uploads
    location /files {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Frappe-Site-Name $frappe_site_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # Default ERPNext Desk home should land in the custom Trader UI
    location = /app/home {
        return 302 /;
    }

    # ERPNext Desk (admin access)
    location /app {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Frappe-Site-Name $frappe_site_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # Frappe print format
    location /printview {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Frappe-Site-Name $frappe_site_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # WebSocket
    location /socket.io {
        set $websocket_upstream http://websocket:9000;
        proxy_pass $websocket_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Frappe-Site-Name $frappe_site_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # --- Custom Frontend Routes ---

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }

    # Everything else → Trader UI frontend
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;

        # SPA fallback
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
