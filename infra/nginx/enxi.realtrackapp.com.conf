# Host nginx — enxi.realtrackapp.com
# Install: sudo cp infra/nginx/enxi.realtrackapp.com.conf /etc/nginx/sites-available/enxi.realtrackapp.com
#          sudo ln -sf /etc/nginx/sites-available/enxi.realtrackapp.com /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
#
# TLS certs (after DNS points to this server):
#   sudo certbot --nginx -d enxi.realtrackapp.com -d www.enxi.realtrackapp.com

upstream traders_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP — ACME + redirect to HTTPS (enable redirect after certs exist)
server {
    listen 80;
    listen [::]:80;
    server_name enxi.realtrackapp.com www.enxi.realtrackapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://enxi.realtrackapp.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name enxi.realtrackapp.com www.enxi.realtrackapp.com;

    ssl_certificate /etc/letsencrypt/live/enxi.realtrackapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enxi.realtrackapp.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/enxi_access.log;
    error_log /var/log/nginx/enxi_error.log;

    client_max_body_size 50M;

    location / {
        proxy_pass http://traders_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
